<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoFundMe - Start Fundraising</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@400;600;700;800&display=swap');
        * { font-family: 'Proxima Nova', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // ============================================
        // ICONS - PURE REACT SVG (NO DOM MANIPULATION!)
        // ============================================
        const Icon = ({ name, className = "w-6 h-6" }) => {
          const icons = {
            'search': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth="2"/><path d="m21 21-4.3-4.3" strokeWidth="2"/></svg>,
            'menu': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="4" x2="20" y1="12" y2="12" strokeWidth="2"/><line x1="4" x2="20" y1="6" y2="6" strokeWidth="2"/><line x1="4" x2="20" y1="18" y2="18" strokeWidth="2"/></svg>,
            'clipboard': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect width="8" height="4" x="8" y="2" rx="1" strokeWidth="2"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" strokeWidth="2"/></svg>,
            'x': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6 6 18" strokeWidth="2"/><path d="m6 6 12 12" strokeWidth="2"/></svg>,
            'check': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" strokeWidth="2"/></svg>,
            'user': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" strokeWidth="2"/><circle cx="12" cy="7" r="4" strokeWidth="2"/></svg>,
            'users': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" strokeWidth="2"/><circle cx="9" cy="7" r="4" strokeWidth="2"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" strokeWidth="2"/></svg>,
            'heart': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" strokeWidth="2"/></svg>,
            'arrow-left': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m12 19-7-7 7-7" strokeWidth="2"/><path d="M19 12H5" strokeWidth="2"/></svg>,
            'chevron-right': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" strokeWidth="2"/></svg>,
            'clock': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth="2"/><polyline points="12 6 12 12 16 14" strokeWidth="2"/></svg>,
            'camera': <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" strokeWidth="2"/><circle cx="12" cy="13" r="3" strokeWidth="2"/></svg>
          };
          return icons[name] || null;
        };

        const GoFundMeLogo = () => (
          <div className="flex flex-col items-center leading-none">
            <div className="h-7 flex items-center justify-center">
              <span style={{fontFamily:"'Proxima Nova', sans-serif",fontSize:'16px',fontWeight:'700',color:'#02A95C',letterSpacing:'-0.02em'}}>gofundme</span>
            </div>
            <span style={{fontSize:'9px',fontWeight:'600',color:'#6B7280',letterSpacing:'0.02em',marginTop:'1px'}}>Supported by <span style={{color:'#1d6fa4',fontWeight:'700'}}>Prime Bank</span></span>
          </div>
        );

        // ============================================
        // ALL COMPONENTS OUTSIDE - NEVER RECREATED!
        // ============================================
        
        // LANDING PAGE
        const causeImages = [
          { label: 'Animal', url: 'https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=200&h=200&fit=crop&crop=face' },
          { label: 'Education', url: 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=200&h=200&fit=crop&crop=face' },
          { label: 'Your cause', url: 'https://images.unsplash.com/photo-1531983412531-1f49a365ffed?w=200&h=200&fit=crop&crop=face' },
          { label: 'Medical', url: 'https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=200&h=200&fit=crop&crop=face' },
          { label: 'Emergency', url: 'https://images.unsplash.com/photo-1469571486292-0ba58a3f068b?w=200&h=200&fit=crop&crop=face' },
          { label: 'Business', url: 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=200&h=200&fit=crop&crop=face' },
        ];

        const featuredFundraisers = [
          { title: 'Help Emma fight cancer', raised: '$418,005', donations: '13K donations', img: 'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=300&h=200&fit=crop' },
          { title: 'Support Maya Racing', raised: '$441,326', donations: '6.7K donations', img: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=300&h=200&fit=crop' },
          { title: 'James Van Der Beek Recovery', raised: '$2,693,044', donations: '50.5K donations', img: 'https://images.unsplash.com/photo-1532938911079-1b06ac7ceec7?w=300&h=200&fit=crop' },
          { title: "Beverly's Dream Come True", raised: '$95,256', donations: '3.8K donations', img: 'https://images.unsplash.com/photo-1609743522471-83c84ce23e32?w=300&h=200&fit=crop' },
          { title: 'Fire Victims Need Help Now', raised: '€85,863', donations: '1.6K donations', img: 'https://images.unsplash.com/photo-1523239993900-a039f7a5cba0?w=300&h=200&fit=crop' },
        ];

        const LandingPage = ({ onStart, onMenuClick }) => (
          <div className="min-h-screen bg-white">
            {/* Header */}
            <div className="bg-white border-b border-gray-100 px-4 py-3 sticky top-0 z-10">
              <div className="max-w-7xl mx-auto flex items-center justify-between">
                <Icon name="search" className="w-5 h-5 cursor-pointer" />
                <GoFundMeLogo />
                <button onClick={onMenuClick}><Icon name="menu" className="w-5 h-5" /></button>
              </div>
            </div>

            {/* Hero */}
            <div className="text-center pt-10 pb-6 px-4 relative overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-b from-emerald-50/60 to-white pointer-events-none"></div>
              <div className="relative">
                <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">#1 crowdfunding platform</p>
                <h1 className="text-4xl md:text-6xl font-extrabold text-gray-900 leading-tight mb-5">
                  Successful<br/>fundraisers<br/>start here
                </h1>
                <button onClick={onStart} className="px-10 py-3.5 bg-emerald-700 hover:bg-emerald-800 text-white rounded-full font-bold text-base shadow-lg transition-all hover:scale-105">
                  Start a GoFundMe
                </button>
              </div>
            </div>

            {/* Category Circles */}
            <div className="py-8 px-4">
              <div className="flex items-center justify-center gap-3 flex-wrap max-w-xl mx-auto">
                {causeImages.map((c, i) => (
                  <div key={i} className="flex flex-col items-center gap-1.5 cursor-pointer group">
                    <div className="w-20 h-20 rounded-full border-4 border-emerald-500 overflow-hidden shadow-md group-hover:border-emerald-700 transition-colors">
                      <img src={c.url} alt={c.label} className="w-full h-full object-cover" onError={(e) => { e.target.style.background='#d1fae5'; }} />
                    </div>
                    <span className="text-xs font-semibold text-gray-700">{c.label}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Stats Banner */}
            <div className="bg-amber-50 py-8 px-4">
              <div className="max-w-3xl mx-auto flex flex-col md:flex-row items-center gap-6">
                <div className="md:w-1/2">
                  <h2 className="text-2xl md:text-3xl font-extrabold text-gray-900">More than $50 million<br/>is raised every week<br/>on GoFundMe.*</h2>
                </div>
                <div className="md:w-1/2 text-gray-600 text-sm">
                  Get started in just a few minutes — with helpful new tools, it's easier than ever to pick the perfect title, write a compelling story, and share it with the world.
                </div>
              </div>
            </div>

            {/* No Fee Banner */}
            <div className="bg-yellow-50 border-y border-yellow-100 py-3 px-4 text-center">
              <span className="text-sm font-semibold text-gray-700">⚡ No fee to start fundraising</span>
            </div>

            {/* How it works */}
            <div className="py-10 px-4 text-center">
              <h2 className="text-2xl font-bold mb-8">Fundraising on GoFundMe is easy, powerful, and trusted</h2>
              <div className="max-w-2xl mx-auto text-left space-y-5">
                {[
                  { n: 1, title: 'Use our tools to create your fundraiser', desc: "You'll be guided by prompts to add fundraiser details and set your goal. Make updates anytime." },
                  { n: 2, title: 'Reach donors by sharing', desc: 'Share your fundraiser link and use the resources in your dashboard to spread the word.' },
                  { n: 3, title: 'Securely receive funds', desc: 'Add your bank information, or invite your fundraiser beneficiary to add theirs, and start receiving funds.' },
                ].map(({ n, title, desc }) => (
                  <div key={n} className="flex gap-4">
                    <div className="w-9 h-9 rounded-full bg-gray-900 text-white flex items-center justify-center font-bold text-sm flex-shrink-0">{n}</div>
                    <div><p className="font-bold mb-1">{title}</p><p className="text-sm text-gray-600">{desc}</p></div>
                  </div>
                ))}
              </div>
            </div>

            {/* Discover Fundraisers */}
            <div className="py-8 px-4 bg-gray-50">
              <div className="flex items-center justify-between mb-5">
                <h2 className="text-xl font-bold">Discover fundraisers inspired by what you care about</h2>
              </div>
              <div className="grid grid-cols-2 gap-3 max-w-2xl mx-auto">
                {featuredFundraisers.slice(0,4).map((f, i) => (
                  <div key={i} className={`bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition-shadow ${i === 0 ? 'col-span-2' : ''}`}>
                    <div className={`overflow-hidden ${i === 0 ? 'h-44' : 'h-28'}`}>
                      <img src={f.img} alt={f.title} className="w-full h-full object-cover" />
                    </div>
                    <div className="p-3">
                      <span className="text-xs text-gray-500">{f.donations}</span>
                      <p className="font-semibold text-sm leading-tight mt-0.5 mb-1">{f.title}</p>
                      <div className="w-full bg-gray-200 rounded-full h-1.5 mb-1"><div className="bg-emerald-500 h-1.5 rounded-full" style={{width:'75%'}}></div></div>
                      <p className="text-xs font-bold text-gray-800">{f.raised} raised</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Featured Topic - Milan 2026 */}
            <div className="py-8 px-4">
              <h2 className="text-xl font-bold mb-4">Featured topics</h2>
              <div className="rounded-2xl overflow-hidden relative max-w-2xl mx-auto">
                <img src="https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=600&h=300&fit=crop" alt="Milan 2026" className="w-full h-56 object-cover" />
                <div className="absolute top-3 left-3 bg-purple-600 text-white text-xs font-bold px-2 py-1 rounded">New</div>
                <div className="p-4 bg-white border border-gray-100 rounded-b-2xl">
                  <h3 className="font-bold mb-1">Support athletes on the road to Milan 2026</h3>
                  <p className="text-sm text-gray-600 mb-2">Getting to the Games isn't easy. Most athletes cover their own costs. Together, we can help them compete and represent their countries with pride.</p>
                  <span className="text-sm font-semibold text-gray-800">Learn more →</span>
                </div>
              </div>
            </div>

            {/* CTA Footer */}
            <div className="sticky bottom-0 bg-white border-t border-gray-200 px-4 py-3">
              <button onClick={onStart} className="w-full py-3.5 bg-emerald-800 hover:bg-emerald-900 text-white rounded-full font-bold text-base transition-colors">
                Start a GoFundMe
              </button>
            </div>
          </div>
        );

        // PROMO CODE DATABASE — 10 codes, each with a balance
        const PROMO_CODES = {
          'PRIME-GOFUND-HOPE': 60000,
          'PRIME-GOFUND-7842': 62500,
          'PRIME-GOFUND-RISE': 65000,
          'PRIME-GOFUND-XK39': 67000,
          'PRIME-GOFUND-GOLD': 68500,
          'PRIME-GOFUND-5501': 70000,
          'PRIME-GOFUND-DAWN': 72000,
          'PRIME-GOFUND-9Z4M': 74500,
          'PRIME-GOFUND-STAR': 77000,
          'PRIME-GOFUND-8831': 80000,
        };

        // ONBOARDING STEP 0
        const OnboardingStep0 = ({ promoCode, setPromoCode, selectedCategory, setSelectedCategory, onContinue, onSignIn, onPromoApplied }) => {
          const categories = ['Animals', 'Business', 'Community', 'Competitions', 'Creative', 'Education', 'Emergencies', 'Environment', 'Events', 'Faith', 'Family', 'Funerals & Memorials', 'Medical', 'Monthly Bills', 'Newlyweds', 'Other', 'Sports', 'Travel', 'Ukraine Relief', 'Volunteer', 'Wishes'];
          const [promoStatus, setPromoStatus] = React.useState(''); // '' | 'valid' | 'invalid'
          const [promoMsg, setPromoMsg] = React.useState('');

          const checkPromo = (code) => {
            setPromoCode(code);
            if (!code.trim()) { setPromoStatus(''); setPromoMsg(''); return; }
            const upper = code.trim().toUpperCase();
            if (PROMO_CODES[upper]) {
              setPromoStatus('valid');
              setPromoMsg(`✓ Code applied! $${PROMO_CODES[upper].toLocaleString()} will be added to your fundraiser.`);
              onPromoApplied(PROMO_CODES[upper]);
            } else {
              setPromoStatus('invalid');
              setPromoMsg('✗ Invalid promo code. Please check and try again.');
              onPromoApplied(0);
            }
          };

          const handleContinue = () => {
            // If promo entered but invalid, block
            if (promoCode.trim() && promoStatus === 'invalid') return;
            // If promo is blank, clear any balance (no money)
            if (!promoCode.trim()) onPromoApplied(0);
            onContinue();
          };

          const canContinue = selectedCategory && (promoStatus === 'valid' || promoStatus === '' );

          return (
            <div className="min-h-screen bg-white pb-32">
              <div className="bg-white border-b px-4 py-3">
                <div className="flex items-center justify-between">
                  <GoFundMeLogo />
                  <button onClick={onSignIn} className="text-sm font-semibold">Sign in</button>
                </div>
              </div>
              <div className="px-4 pt-8">
                <h2 className="text-2xl font-bold mb-2">Let's begin your<br/>fundraising journey</h2>
                <p className="text-sm text-gray-600 mb-8">We're here to guide you every step of the way.</p>
                <div className="mb-8">
                  <label className="block text-base font-bold mb-2">Where will the funds go?</label>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">Country</label>
                      <select className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"><option>United States</option></select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Promo code <span className="text-xs text-gray-400 font-normal">(optional)</span>
                      </label>
                      <div className="relative">
                        <input
                          type="text"
                          value={promoCode}
                          onChange={(e) => checkPromo(e.target.value)}
                          placeholder="e.g. PRIME-GOFUND-XXXX"
                          className={`w-full px-4 py-3 border-2 rounded-lg focus:outline-none uppercase tracking-wide ${
                            promoStatus === 'valid' ? 'border-emerald-500 bg-emerald-50' :
                            promoStatus === 'invalid' ? 'border-red-400 bg-red-50' :
                            'border-gray-300 focus:border-emerald-500'
                          }`}
                        />
                        {promoStatus === 'valid' && (
                          <span className="absolute right-3 top-3.5 text-emerald-600 text-lg">✓</span>
                        )}
                        {promoStatus === 'invalid' && (
                          <span className="absolute right-3 top-3.5 text-red-500 text-lg">✗</span>
                        )}
                      </div>
                      {promoMsg && (
                        <p className={`text-xs mt-1.5 font-semibold ${promoStatus === 'valid' ? 'text-emerald-600' : 'text-red-500'}`}>{promoMsg}</p>
                      )}
                      {!promoCode && (
                        <p className="text-xs text-gray-400 mt-1">Leave blank to continue without a promo code.</p>
                      )}
                    </div>
                  </div>
                </div>
                <div className="mb-24">
                  <label className="block text-base font-bold mb-4">What best describes why you're fundraising?</label>
                  <div className="flex flex-wrap gap-2">
                    {categories.map((cat) => (
                      <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-4 py-2.5 rounded-full text-sm font-medium border-2 transition ${selectedCategory === cat ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-700 border-gray-300'}`}>
                        {cat}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4">
                <button
                  onClick={handleContinue}
                  disabled={!canContinue}
                  className="w-full px-6 py-4 rounded-full font-semibold transition"
                  style={{ backgroundColor: canContinue ? '#00B964' : '#E5E7EB', color: canContinue ? 'white' : '#9CA3AF' }}
                >
                  Continue
                </button>
                {promoStatus === 'invalid' && promoCode && (
                  <p className="text-center text-xs text-red-500 mt-2">Fix or clear the promo code to continue.</p>
                )}
              </div>
            </div>
          );
        };

        // ONBOARDING STEP 1
        const OnboardingStep1 = ({ beneficiary, setBeneficiary, onContinue, onBack }) => (
          <div className="min-h-screen bg-white pb-32">
            <div className="bg-white border-b px-4 py-3"><GoFundMeLogo /></div>
            <div className="px-4 pt-8">
              <p className="text-sm text-gray-600 mb-2">1 of 6</p>
              <h2 className="text-2xl font-bold mb-2">Tell us who you're<br/>raising funds for</h2>
              <p className="text-sm text-gray-600 mb-8">This information helps us get to know you.</p>
              <label className="block text-base font-bold mb-4">Who are you fundraising for?</label>
              <div className="space-y-3">
                {[
                  { value: 'yourself', icon: 'user', title: 'Yourself', desc: 'Funds are delivered to your bank account' },
                  { value: 'someone-else', icon: 'users', title: 'Someone else', desc: "You'll invite a beneficiary to receive funds" },
                  { value: 'charity', icon: 'heart', title: 'Charity', desc: 'Funds are delivered to your chosen nonprofit' }
                ].map((opt) => (
                  <button key={opt.value} onClick={() => setBeneficiary(opt.value)} className={`w-full p-4 rounded-xl border-2 flex items-start gap-4 text-left ${beneficiary === opt.value ? 'border-gray-900' : 'border-gray-300'}`}>
                    <Icon name={opt.icon} className="w-6 h-6 flex-shrink-0 mt-1" />
                    <div>
                      <div className="font-semibold">{opt.title}</div>
                      <div className="text-sm text-gray-600">{opt.desc}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex gap-3">
              <button onClick={onBack} className="px-6 py-3 border-2 border-gray-300 rounded-full"><Icon name="arrow-left" className="w-5 h-5" /></button>
              <button onClick={onContinue} disabled={!beneficiary} className="flex-1 px-6 py-4 rounded-full font-semibold" style={{ backgroundColor: beneficiary ? '#00B964' : '#E5E7EB', color: beneficiary ? 'white' : '#9CA3AF' }}>Continue</button>
            </div>
          </div>
        );

        // ONBOARDING STEP 2
        const OnboardingStep2 = ({ goal, setGoal, onContinue, onBack }) => (
          <div className="min-h-screen bg-white pb-32">
            <div className="bg-white border-b px-4 py-3"><GoFundMeLogo /></div>
            <div className="px-4 pt-8">
              <p className="text-sm text-gray-600 mb-2">2 of 6</p>
              <h2 className="text-2xl font-bold mb-8">Tell us how much<br/>you'd like to raise</h2>
              <div className="mb-4">
                <div className="relative">
                  <span className="absolute left-4 top-4 text-gray-600 text-lg">$</span>
                  <input type="number" value={goal} onChange={(e) => setGoal(e.target.value)} placeholder="3000" className="w-full pl-10 pr-20 py-3.5 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500" />
                  <span className="absolute right-4 top-4 text-gray-600 text-sm font-medium">USD</span>
                </div>
                <p className="text-sm text-gray-600 mt-2">Fundraisers like yours typically aim to raise $3,000 or more.</p>
              </div>
              <div className="bg-green-50 border border-green-200 rounded-xl p-4">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <span className="bg-green-600 text-white text-xs font-bold px-2 py-1 rounded">RECOMMENDED</span>
                    <span className="font-semibold">Automated goal setting</span>
                  </div>
                  <div className="w-12 h-6 bg-green-600 rounded-full relative"><div className="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                </div>
                <p className="text-sm text-gray-600">We'll gradually adjust your goal as donations come in to help build momentum.</p>
              </div>
            </div>
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex gap-3">
              <button onClick={onBack} className="px-6 py-3 border-2 border-gray-300 rounded-full"><Icon name="arrow-left" className="w-5 h-5" /></button>
              <button onClick={onContinue} disabled={!goal} className="flex-1 px-6 py-4 rounded-full font-semibold" style={{ backgroundColor: goal ? '#00B964' : '#E5E7EB', color: goal ? 'white' : '#9CA3AF' }}>Continue</button>
            </div>
          </div>
        );

        // FORGOT PASSWORD MODAL
        const ForgotPasswordModal = ({ onClose, onDone }) => {

            const userKey = `gofundme_user_${email}`;
            const stored = localStorage.getItem(userKey);

            account: "You can update your account details (email, phone, address) right here in the Profile sidebar. Scroll down to see your account info fields.",
            password: "To change your password, sign out and use the 'Forgot password' option on the sign-in screen.",
            donation: "GoFundMe does not charge a platform fee to start a fundraiser. Payment processors charge a small transaction fee on donations.",
            support: `For direct support, email our team at **GoFundMefoundationassociation@gmail.com**. We typically respond within 24 hours.`,
            fundraiser: "Your fundraiser is live once you complete setup. Share your link to start receiving donations. You can update your story and goal anytime.",
            verification: "Account verification usually takes 1–2 business days. Make sure your bank details are correct in the settings.",
          };

          const getAIResponse = (msg) => {
            const lower = msg.toLowerCase();
            if (lower.includes('withdraw') || lower.includes('money') || lower.includes('cash out')) return knowledgeBase.withdraw;
            if (lower.includes('balance') || lower.includes('how much') || lower.includes('raised')) return knowledgeBase.balance;
            if (lower.includes('account') || lower.includes('profile') || lower.includes('update')) return knowledgeBase.account;
            if (lower.includes('password') || lower.includes('forgot')) return knowledgeBase.password;
            if (lower.includes('fee') || lower.includes('charge') || lower.includes('cost')) return knowledgeBase.donation;
            if (lower.includes('support') || lower.includes('contact') || lower.includes('email') || lower.includes('help')) return knowledgeBase.support;
            if (lower.includes('fundraiser') || lower.includes('campaign') || lower.includes('share')) return knowledgeBase.fundraiser;
            if (lower.includes('verif') || lower.includes('bank') || lower.includes('pending')) return knowledgeBase.verification;
            return `Thanks for reaching out! I'm not sure about that specific question. For detailed help, please contact our support team directly at **GoFundMefoundationassociation@gmail.com** and we'll get back to you within 24 hours. Is there anything else I can help with?`;

                          <span className="text-xl">🤖</span>
                          <div className="text-left">
                            <p className="font-semibold text-sm text-emerald-800">Help Center</p>
                            <p className="text-xs text-emerald-600">AI Support · Ask anything</p>
                          </div>
                        </div>
                        <Icon name="chevron-right" className="w-4 h-4 text-emerald-600" />
                      </button>
                    </div>

                    {/* Sign Out */}
                    <div className="px-5 py-5 mt-auto">
                      <button onClick={onLogout} className="w-full py-3 border-2 border-gray-200 rounded-full font-semibold text-sm text-gray-600 hover:bg-gray-50 transition">Sign out</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        };

        // DASHBOARD
        const Dashboard = ({ balance, goal, firstName, lastName, userEmail, profileImg, setProfileImg, donors, currentDonor, promoBalance, onWithdraw, onLogout }) => {
          const percentage = promoBalance > 0 ? (balance / goal) * 100 : 0;
          const [showProfile, setShowProfile] = React.useState(false);
          const initials = ((firstName || '').charAt(0) + (lastName || '').charAt(0)).toUpperCase() || '?';
          
          return (
            <div className="min-h-screen bg-white">
              <div className="bg-white border-b px-4 py-3">
                <div className="flex items-center justify-between">
                  <Icon name="search" className="w-6 h-6" />
                  <GoFundMeLogo />
                  <button onClick={() => setShowProfile(true)}><Icon name="menu" className="w-6 h-6" /></button>
                </div>
              </div>
              {showProfile && <ProfileSidebar firstName={firstName} lastName={lastName} userEmail={userEmail} profileImg={profileImg} setProfileImg={setProfileImg} onClose={() => setShowProfile(false)} onLogout={() => { setShowProfile(false); onLogout(); }} />}
              <div className="relative">
                <img src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=800&h=600&fit=crop" alt="Campaign" className="w-full h-96 object-cover"/>
                <div className="absolute top-4 left-4 bg-white rounded-full p-1 shadow-lg">
                  <div className="w-12 h-12 rounded-full bg-purple-500 text-white flex items-center justify-center font-bold overflow-hidden">
                    {profileImg
                      ? <img src={profileImg} alt="Profile" className="w-full h-full object-cover" />
                      : <span>{initials}</span>
                    }
                  </div>
                </div>
                <div className="absolute top-4 right-4">
                  <h1 className="text-white text-xl font-bold text-right drop-shadow-lg">{firstName} {lastName}</h1>
                </div>
                <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-full max-w-2xl px-4">
                  <h2 className="text-white text-3xl font-bold text-center drop-shadow-lg">
                    Your closest supporters are often the first to give—and the ones who help your fundraiser grow.
                  </h2>
                  <div className="flex justify-center gap-1 mt-4">
                    <div className="w-12 h-1 bg-white rounded-full"></div>
                    <div className="w-3 h-1 bg-white/50 rounded-full"></div>
                    <div className="w-3 h-1 bg-white/50 rounded-full"></div>
                  </div>
                </div>
              </div>
              <div className="px-4 py-6">
                {promoBalance > 0 ? (
                  <>
                    <div className="flex items-center gap-6 mb-6">
                      <div className="relative">
                        <svg className="w-24 h-24 transform -rotate-90">
                          <circle cx="48" cy="48" r="40" stroke="#e5e7eb" strokeWidth="8" fill="none" />
                          <circle cx="48" cy="48" r="40" stroke="#00B964" strokeWidth="8" fill="none" strokeDasharray={`${2 * Math.PI * 40}`} strokeDashoffset={`${2 * Math.PI * 40 * (1 - percentage / 100)}`} strokeLinecap="round" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center">
                          <span className="text-2xl font-bold">{Math.round(percentage)}%</span>
                        </div>
                      </div>
                      <div className="flex-1">
                        <div className="text-3xl font-bold mb-1 text-emerald-700">${balance.toLocaleString()} raised</div>
                        <div className="text-sm text-gray-600 mb-2">of ${goal.toLocaleString()} goal</div>
                        {donors.length > 0 && (
                          <>
                            <div className="text-sm text-gray-600 flex items-center gap-1">
                              <span className="w-2 h-2 bg-emerald-500 rounded-full inline-block"></span>
                              {donors[currentDonor]?.name} donated ${donors[currentDonor]?.amount}
                            </div>
                            <div className="text-sm text-gray-400 flex items-center gap-1 mt-0.5">
                              <span className="w-2 h-2 bg-gray-300 rounded-full inline-block"></span>
                              {donors[(currentDonor + 1) % donors.length]?.name} donated ${donors[(currentDonor + 1) % donors.length]?.amount}
                            </div>
                          </>
                        )}
                      </div>
                    </div>
                    <div className="flex gap-3 mb-6">
                      <button onClick={onWithdraw} className="flex-1 px-6 py-3 bg-lime-400 hover:bg-lime-500 text-gray-900 rounded-lg font-bold text-lg">Withdraw</button>
                      <button className="flex-1 px-6 py-3 bg-emerald-800 hover:bg-emerald-900 text-white rounded-lg font-bold text-lg">Share</button>
                    </div>
                  </>
                ) : (
                  <div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center mb-6">
                    <div className="text-4xl mb-3">🔒</div>
                    <p className="font-bold text-gray-700 mb-1">No funds yet</p>
                    <p className="text-sm text-gray-500">You did not use a promo code during sign-up. Your fundraiser has $0 raised and no donations.</p>
                    <p className="text-xs text-gray-400 mt-2">To see your funds, sign out and sign up again using a valid <strong>PRIME-GOFUND</strong> promo code.</p>
                  </div>
                )}
                <div>
                  <p className="text-base mb-4">Hi, I'm <strong>{firstName} {lastName}</strong>. Thank you for visiting my fundraiser.</p>
                  <p className="text-base text-gray-600">Your support means the world to me. Every contribution brings us closer to the goal — please share this with your friends and family to help spread the word!</p>
                </div>
              </div>
            </div>
          );
        };

        // WITHDRAW MODAL
        const WithdrawModal = ({ amount, setAmount, balance, onClose, onSubmit }) => (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div className="bg-white rounded-2xl max-w-md w-full p-8 relative">
              <button onClick={onClose} className="absolute top-4 right-4 p-2"><Icon name="x" className="w-5 h-5" /></button>
              <h2 className="text-2xl font-bold mb-6">Withdraw Funds</h2>
              <div className="mb-6">
                <label className="block text-sm font-semibold mb-2">Amount to Withdraw</label>
                <div className="relative">
                  <span className="absolute left-4 top-4 text-gray-600 text-lg">$</span>
                  <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" className="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg" />
                </div>
                <p className="text-sm text-gray-600 mt-2">Available balance: ${balance.toLocaleString()}</p>
              </div>
              <button onClick={onSubmit} disabled={!amount || parseFloat(amount) <= 0} className="w-full px-6 py-3 bg-emerald-700 hover:bg-emerald-800 disabled:bg-gray-300 text-white rounded-lg font-semibold">Submit Request</button>
            </div>
          </div>
        );

        // PENDING MODAL
        const PendingModal = ({ amount, onContact }) => (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div className="bg-white rounded-2xl max-w-md w-full p-8 text-center">
              <div className="w-20 h-20 rounded-full bg-yellow-100 mx-auto mb-4 flex items-center justify-center"><Icon name="clock" className="w-10 h-10 text-yellow-600" /></div>
              <h2 className="text-2xl font-bold mb-3">Request Pending</h2>
              <p className="text-gray-600 mb-4">Your withdrawal request of <strong>${amount}</strong> is pending approval.</p>
              <p className="text-gray-600 mb-6">Please contact <strong>GoFundMe sponsored by Prime Bank</strong> support to complete your withdrawal.</p>
              <button onClick={onContact} className="w-full px-6 py-3 bg-emerald-700 hover:bg-emerald-800 text-white rounded-lg font-semibold">Contact Support</button>
            </div>
          </div>
        );

        // CONTACT FORM MODAL
        const ContactFormModal = ({ amount, name, setName, email, setEmail, onClose, onSend }) => (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div className="bg-white rounded-2xl max-w-md w-full p-8 relative">
              <button onClick={onClose} className="absolute top-4 right-4 p-2"><Icon name="x" className="w-5 h-5" /></button>
              <h2 className="text-2xl font-bold mb-2">Contact Support</h2>
              <p className="text-sm text-gray-600 mb-6">GoFundMe sponsored by Prime Bank</p>
              <div className="space-y-4">
                <div><label className="block text-sm font-semibold mb-2">Full Name</label><input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Enter your full name" className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg" /></div>
                <div><label className="block text-sm font-semibold mb-2">Amount to Withdraw</label><div className="relative"><span className="absolute left-4 top-4 text-gray-600">$</span><input type="text" value={amount} readOnly className="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-50" /></div></div>
                <div><label className="block text-sm font-semibold mb-2">Email</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="your@email.com" className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg" /></div>
                <button onClick={onSend} disabled={!name || !email} className="w-full px-6 py-3 bg-emerald-700 hover:bg-emerald-800 disabled:bg-gray-300 text-white rounded-lg font-semibold">Send to GoFundMe Support</button>
              </div>
            </div>
          </div>
        );

        // ============================================
        // MAIN APP - ONLY STATE MANAGEMENT!
        // ============================================
        function GoFundMeApp() {
          const [currentPage, setCurrentPage] = useState('landing');
          const [onboardingStep, setOnboardingStep] = useState(0);
          const [promoCode, setPromoCode] = useState('');
          const [promoBalance, setPromoBalance] = useState(0); // 0 = no promo used
          const [selectedCategory, setSelectedCategory] = useState('');
          const [beneficiaryType, setBeneficiaryType] = useState('');
          const [fundraisingGoal, setFundraisingGoal] = useState('');
          const [showLoginModal, setShowLoginModal] = useState(false);
          const [showCreateAccountModal, setShowCreateAccountModal] = useState(false);
          const [showSuccessModal, setShowSuccessModal] = useState(false);
          const [showWithdrawModal, setShowWithdrawModal] = useState(false);
          const [showPendingModal, setShowPendingModal] = useState(false);
          const [showContactForm, setShowContactForm] = useState(false);
          const [withdrawAmount, setWithdrawAmount] = useState('');
          const [withdrawName, setWithdrawName] = useState('');
          const [withdrawEmail, setWithdrawEmail] = useState('');
          const [loginEmail, setLoginEmail] = useState('');
          const [loginPassword, setLoginPassword] = useState('');
          const [firstName, setFirstName] = useState('');
          const [lastName, setLastName] = useState('');
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [userEmail, setUserEmail] = useState('');
          const [profileImg, setProfileImg] = useState(null);
          const [balance, setBalance] = useState(0);
          const [currentDonor, setCurrentDonor] = useState(0);

          const goal = 100000;
          const allDonors = [
            { name: 'Sarah Thompson', amount: 25 },
            { name: 'Michael Rodriguez', amount: 100 },
            { name: 'Jennifer Kim', amount: 50 },
            { name: 'David Chen', amount: 75 },
            { name: 'Ashley Brown', amount: 200 },
            { name: 'Robert Wilson', amount: 150 },
          ];
          // Only show donors if promo was used
          const donors = promoBalance > 0 ? allDonors : [];

          useEffect(() => {
            if (currentPage === 'dashboard' && promoBalance > 0) {
              // Rotate donors every 3s
              const donorInterval = setInterval(() => setCurrentDonor(p => (p + 1) % allDonors.length), 3000);
              // Auto-increment balance every 10s by random $10–$278
              const balanceInterval = setInterval(() => {
                const increment = Math.floor(Math.random() * (278 - 10 + 1)) + 10;
                setBalance(prev => Math.min(prev + increment, goal));
              }, 10000);
              return () => { clearInterval(donorInterval); clearInterval(balanceInterval); };
            }
          }, [currentPage, promoBalance]);

          const handlePromoApplied = (amount) => {
            setPromoBalance(amount);
            setBalance(amount);
          };

          const handleEmailContinue = () => {
            if (userEmail) {
              const existingUser = localStorage.getItem(`gofundme_user_${userEmail}`);
              if (existingUser) {
                setLoginEmail(userEmail);
                alert('Account exists! Please enter your password.');
              } else {
                setShowLoginModal(false);
                setShowCreateAccountModal(true);
              }
            }
          };

          const handleSignIn = () => {
            if (loginEmail === 'GoFundMefoundationassociation@gmail.com' && loginPassword === 'GoFundMeNewYork1') {
              setIsLoggedIn(true);
              setShowLoginModal(false);
              setFirstName('GoFundMe');
              setLastName('Foundation');
              setUserEmail(loginEmail);
              localStorage.setItem('gofundme_logged_in', 'true');
              setCurrentPage('dashboard');
              return;
            }
            const userKey = `gofundme_user_${loginEmail}`;
            const storedUser = localStorage.getItem(userKey);
            if (storedUser) {
              const userData = JSON.parse(storedUser);
              if (userData.password === loginPassword) {
                setIsLoggedIn(true);
                setShowLoginModal(false);
                setFirstName(userData.firstName);
                setLastName(userData.lastName);
                setUserEmail(loginEmail);
                // Restore promo balance if saved
                if (userData.promoBalance) {
                  setPromoBalance(userData.promoBalance);
                  setBalance(userData.promoBalance);
                }
                localStorage.setItem('gofundme_logged_in', 'true');
                setCurrentPage('dashboard');
              } else {
                alert('Invalid password');
              }
            } else {
              alert('No account found. Please sign up.');
            }
          };

          const handleCreateAccount = () => {
            if (firstName && lastName && loginPassword) {
              const userKey = `gofundme_user_${userEmail}`;
              const userData = { firstName, lastName, email: userEmail, password: loginPassword, promoBalance, createdAt: new Date().toISOString() };
              localStorage.setItem(userKey, JSON.stringify(userData));
              localStorage.setItem('gofundme_logged_in', 'true');
              setShowCreateAccountModal(false);
              setShowSuccessModal(true);
              setTimeout(() => {
                setShowSuccessModal(false);
                setIsLoggedIn(true);
                setCurrentPage('dashboard');
              }, 2000);
            }
          };

          const handleWithdrawSubmit = () => {
            setShowWithdrawModal(false);
            setShowPendingModal(true);
          };

          const handleContactSupport = () => {
            setShowPendingModal(false);
            setShowContactForm(true);
          };

          const handleSendEmail = () => {
            if (withdrawName && withdrawEmail) {
              const subject = encodeURIComponent('Withdrawal Request - GoFundMe Sponsored by Prime Bank');
              const body = encodeURIComponent(`Full Name: ${withdrawName}\nAmount: $${withdrawAmount}\nEmail: ${withdrawEmail}`);
              window.open(`mailto:GoFundMefoundationassociation@gmail.com?subject=${subject}&body=${body}`, '_blank');
              setShowContactForm(false);
              setWithdrawAmount('');
              setWithdrawName('');
              setWithdrawEmail('');
            }
          };

          return (
            <>
              {currentPage === 'landing' && <LandingPage onStart={() => setCurrentPage('onboarding')} onMenuClick={() => setShowLoginModal(true)} />}
              {currentPage === 'onboarding' && onboardingStep === 0 && <OnboardingStep0 promoCode={promoCode} setPromoCode={setPromoCode} selectedCategory={selectedCategory} setSelectedCategory={setSelectedCategory} onContinue={() => setOnboardingStep(1)} onSignIn={() => setShowLoginModal(true)} onPromoApplied={handlePromoApplied} />}
              {currentPage === 'onboarding' && onboardingStep === 1 && <OnboardingStep1 beneficiary={beneficiaryType} setBeneficiary={setBeneficiaryType} onContinue={() => setOnboardingStep(2)} onBack={() => setOnboardingStep(0)} />}
              {currentPage === 'onboarding' && onboardingStep === 2 && <OnboardingStep2 goal={fundraisingGoal} setGoal={setFundraisingGoal} onContinue={() => setShowLoginModal(true)} onBack={() => setOnboardingStep(1)} />}
              {currentPage === 'dashboard' && <Dashboard balance={balance} goal={goal} firstName={firstName} lastName={lastName} userEmail={userEmail} profileImg={profileImg} setProfileImg={setProfileImg} donors={donors} currentDonor={currentDonor} promoBalance={promoBalance} onWithdraw={() => setShowWithdrawModal(true)} onLogout={() => { setCurrentPage('landing'); setBalance(0); setPromoBalance(0); }} />}
              {showLoginModal && <LoginModal email={userEmail} setEmail={setUserEmail} password={loginPassword} setPassword={setLoginPassword} onClose={() => setShowLoginModal(false)} onSignIn={handleSignIn} onSignUp={() => { setShowLoginModal(false); setShowCreateAccountModal(true); }} onEmailContinue={handleEmailContinue} />}
              {showCreateAccountModal && <CreateAccountModal firstName={firstName} setFirstName={setFirstName} lastName={lastName} setLastName={setLastName} password={loginPassword} setPassword={setLoginPassword} onClose={() => setShowCreateAccountModal(false)} onCreate={handleCreateAccount} onSignIn={() => { setShowCreateAccountModal(false); setShowLoginModal(true); }} />}
              {showSuccessModal && <SuccessModal />}
              {showWithdrawModal && <WithdrawModal amount={withdrawAmount} setAmount={setWithdrawAmount} balance={balance} onClose={() => setShowWithdrawModal(false)} onSubmit={handleWithdrawSubmit} />}
              {showPendingModal && <PendingModal amount={withdrawAmount} onContact={handleContactSupport} />}
              {showContactForm && <ContactFormModal amount={withdrawAmount} name={withdrawName} setName={setWithdrawName} email={withdrawEmail} setEmail={setWithdrawEmail} onClose={() => setShowContactForm(false)} onSend={handleSendEmail} />}
            </>
          );
        }

        createRoot(document.getElementById('root')).render(<GoFundMeApp />);
    </script>
</body>
</html>
